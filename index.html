<!DOCTYPE html>
<html lang="en" ng-app="helloApp">

<head>
    <meta charset="UTF-8">
    <title>AngularJS Stylish Hello App</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- CSS inside HTML -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .message {
            font-size: 18px;
            margin-bottom: 20px;
            color: #555;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .output {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .footer {
            font-size: 14px;
            color: #888;
        }
    </style>

    <!-- Link to external JS -->
    <script src="app.js"></script>
</head>

<body ng-controller="HelloController">

    <div class="card">
        <h1>🌟 Welcome</h1>
        <div class="message">{{ message }}</div>

        <input type="text" ng-model="name" placeholder="Enter Your Name">

        <div class="output" ng-show="name">
            👋 Hello {{ name | uppercase }}
        </div>

        <div class="footer">
            Built with AngularJS
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" ng-app="helloApp">

<head>
    <meta charset="UTF-8">
    <title>AngularJS Stylish Hello App</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- CSS inside HTML -->
    <style>
        /* Body styling */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Card styling */
        .card {
            background: linear-gradient(145deg, #ffffff, #f3f3f3);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2),
                        inset 0 -5px 15px rgba(0,0,0,0.05);
            text-align: center;
            width: 420px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25),
                        inset 0 -5px 15px rgba(0,0,0,0.05);
        }

        /* Heading */
        h1 {
            margin-bottom: 20px;
            color: #4b0082;
            font-size: 32px;
            letter-spacing: 1px;
        }

        /* Message */
        .message {
            font-size: 18px;
            margin-bottom: 30px;
            color: #555;
            letter-spacing: 0.5px;
        }

        /* Input box */
        input {
            width: 85%;
            padding: 14px;
            margin-bottom: 25px;
            border-radius: 15px;
            border: 1px solid #ccc;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }

        input:focus {
            border: 2px solid #6e8efb;
            box-shadow: 0 0 12px rgba(110, 142, 251, 0.5);
        }

        /* Output text */
        .output {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #4b0082;
            transition: all 0.5s ease-in-out;
        }

        /* Footer */
        .footer {
            font-size: 14px;
            color: #888;
        }

        /* Fade-in for output */
        .output.ng-hide-remove {
            opacity: 0;
        }
        .output.ng-hide-remove.ng-hide-remove-active {
            opacity: 1;
        }
    </style>

    <!-- Link to external JS -->
    <script src="app.js"></script>
</head>

<body ng-controller="HelloController">

    <div class="card">
        <h1>🌟 Welcome</h1>
        <div class="message">{{ message }}</div>

        <input type="text" ng-model="name" placeholder="Enter Your Name">

        <div class="output" ng-show="name">
            👋 Hello {{ name | uppercase }}
        </div>

        <div class="footer">
            Built with AngularJS
        </div>
    </div>

</body>
</html>
